<!DOCTYPE html>
<html>
<head>
  <title>玩家加入</title>
</head>
<body>
  <h2>加入游戏</h2>

  <input id="roomCode" placeholder="房间码"><br><br>
  <input id="name" placeholder="名字"><br><br>

  <select id="team">
    <option value="red">红队</option>
    <option value="black">黑队</option>
  </select><br><br>

  <button onclick="join()">加入</button>

  <h4 id="refreshTime"></h4>
  <pre id="result" style="white-space: pre-wrap;"></pre>

  <hr>

  <h3>规则说明</h3>
  <pre style="white-space: pre-wrap;">
1) 需要主控先创建房间：
   - 房间码：由主控在主控页面输入（你们自己定）

2) 玩家加入：
   - 输入房间码、名字、选择红队/黑队
   - 加入后等待主控开始

3) 每局（刷新身份）：
   - 队伍不变，只重新随机身份
   - 每队随机卧底：
     - 队伍人数 ≤ 1：不分配卧底
     - 队伍人数 = 2：固定 1 名卧底
     - 队伍人数 ≥ 3：随机 1 或 2 名卧底

4) 身份显示：
   - 普通队员：只显示“普通队员”
   - 卧底：显示“己方卧底 + 对方卧底是谁”
  </pre>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const refreshEl = document.getElementById("refreshTime");
    const resultEl = document.getElementById("result");

    function join() {
      const roomCode = document.getElementById("roomCode").value.trim();
      const name = document.getElementById("name").value.trim();
      const team = document.getElementById("team").value;

      if (!roomCode) {
        resultEl.innerText = "请输入房间码";
        return;
      }
      if (!name) {
        resultEl.innerText = "请输入名字再加入";
        return;
      }

      socket.emit("join", { name, team, roomCode });
      resultEl.innerText = "加入中…";
    }

    socket.on("joinError", (data) => {
      refreshEl.innerText = "";
      resultEl.innerText = data.msg || "加入失败";
    });

    socket.on("joined", (data) => {
      const teamName = data.team === "red" ? "红队" : "黑队";
      resultEl.innerText = `你已加入【${teamName}】，等待主控开始`;
    });

    socket.on("role", (data) => {
      const ts = new Date(data.startedAt || Date.now()).toLocaleString();
      refreshEl.innerText = `刷新时间：${ts}`;

      if (data.role === "spy") {
        resultEl.innerText =
          "你是卧底！\n" +
          "己方卧底：" + (data.ownSpies?.join(", ") || "无") + "\n" +
          "对方卧底：" + (data.enemySpies?.join(", ") || "无");
      } else {
        resultEl.innerText = "你是普通队员";
      }
    });

    socket.on("kicked", () => {
      refreshEl.innerText = "";
      resultEl.innerText = "你被主控踢出";
    });
  </script>
</body>
</html>
